name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build benchmark report
        run: python -m app.cli.benchmark --iterations 30 --output reports/ci_measurements.json

      - name: Validate quality gates
        run: |
          python scripts/check_quality_gates.py \
            --report reports/ci_measurements.json \
            --min-phrase-accuracy 95 \
            --max-tts-p95-ms 1500 \
            --max-stt-wer-percent 25 \
            --max-stt-cer-percent 15

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: ci-measurements
          path: reports/ci_measurements.json
